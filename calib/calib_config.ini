# Camera Calibration Configuration File
# ====================================

# Camera model: pinhole or fisheye
camera_model = fisheye

# Input image paths (use absolute paths or paths relative to executable)
left_images_path = /home/soc/docker_ws/data/mirror/viture/left/
right_images_path = /home/soc/docker_ws/data/mirror/viture/right/

# Output calibration file
calibration_file = /home/soc/docker_ws/data/mirror/viture/calibration_fisheye.yaml

# Output directory for rectified images
output_path = /home/soc/docker_ws/data/mirror/viture/output/

# Chessboard settings
board_width = 11
board_height = 8
square_size = 50.0

# Debug mode (enable for more verbose output)
enable_debug = true
